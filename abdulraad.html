<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>abdulraad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container min-vh-100 d-flex flex-column justify-content-center align-items-center py-5">
        
        <div class="w-100 max-w-600 d-flex justify-content-between align-items-center mb-4">
            <h4 class="mb-0 fw-bold">DevQuiz</h4>
            <div class="form-check form-switch">
                <input class="form-check-input cursor-pointer" type="checkbox" role="switch" id="darkModeToggle">
                <label class="form-check-label user-select-none" for="darkModeToggle">Dark Mode</label>
            </div>
        </div>

        <div class="card shadow-lg w-100 max-w-600 border-0 rounded-4">
            <div class="card-body p-4 p-md-5 relative-container">

                <div id="start-screen" class="view-section active text-center">
                    <h2 class="fw-bold mb-3">Programming Fundamentals</h2>
                    <p class="text-muted mb-4">Test your core programming knowledge. You have 20 seconds per question. You must select an answer to proceed.</p>
                    <button id="start-btn" class="btn btn-primary btn-lg px-5 rounded-pill shadow-sm">Start Quiz</button>
                </div>

                <div id="quiz-screen" class="view-section d-none">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span id="question-tracker" class="badge bg-secondary rounded-pill px-3 py-2 fs-6">Question 1/5</span>
                        <div class="timer-badge d-flex align-items-center bg-danger text-white rounded-pill px-3 py-2 fs-6 fw-bold">
                            <span id="time-left">20</span>s
                        </div>
                    </div>
                    
                    <div class="progress mb-4" style="height: 8px;">
                        <div id="progress-bar" class="progress-bar bg-primary" role="progressbar" style="width: 0%;"></div>
                    </div>

                    <h4 id="question-text" class="mb-4 fw-semibold lh-base">Question text goes here?</h4>
                    
                    <div id="options-container" class="d-flex flex-column gap-2 mb-4">
                        </div>

                    <div class="text-end">
                        <button id="next-btn" class="btn btn-primary px-4 rounded-pill" disabled>Next Question</button>
                    </div>
                </div>

                <div id="result-screen" class="view-section d-none text-center">
                    <h2 class="fw-bold mb-3">Quiz Complete!</h2>
                    <div class="display-1 fw-bold text-primary mb-2" id="final-score">0/5</div>
                    <p class="text-muted mb-4" id="score-message">Great effort!</p>
                    
                    <div class="card bg-body-tertiary border-0 rounded-4 mb-4 text-start">
                        <div class="card-body">
                            <h5 class="fw-bold mb-3 border-bottom pb-2">Past Attempts</h5>
                            <ul id="history-list" class="list-group list-group-flush bg-transparent">
                                </ul>
                        </div>
                    </div>

                    <button id="restart-btn" class="btn btn-outline-primary btn-lg px-5 rounded-pill">Take Quiz Again</button>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
